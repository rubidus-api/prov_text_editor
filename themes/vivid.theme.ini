# Example prov color theme (RFC-0021) — a brighter, higher-contrast scheme.
# See solarized.theme.ini for the full format reference. Select with:
#   [ui]  theme = vivid
# (Section prefix is `theme_`; names use lowercase/digits/underscore.)

[theme_vivid]
background = dark
comment    = gray +dim
string     = brightgreen
keyword    = brightblue +bold
type       = brightcyan
number     = brightmagenta
constant   = brightmagenta
function   = brightyellow
preproc    = brightred
builtin    = cyan
error      = white on red
