# Example prov color theme (RFC-0021).
#
# Copy this file into your prov config directory (~/.prov/ on POSIX,
# %USERPROFILE%\.prov\ on Windows, or next to the prov executable) and select a
# theme by name in provconf.ini:  [ui]  theme = solarized_dark
#
# A file may hold several [theme_NAME] sections. The section prefix is `theme_`;
# NAME (what `theme = NAME` selects) is [a-z][a-z0-9_]* — starts with a lowercase
# letter, then lowercase letters / digits / underscore (no spaces, hyphens, or
# uppercase). So `[theme_solarized_dark]` is selected by `theme = solarized_dark`.
#
# Class colors:  class = <fg> [on <bg>] [+bold] [+dim] [+underline]
# Color names: default, the 8 base (black red green yellow blue magenta cyan
# white) and 8 bright (brightblack/gray, brightred, ... brightwhite).
# Classes: keyword type string comment number constant function operator preproc
# punctuation builtin error  (unset = terminal default; leaving the mass of code
# uncolored keeps the screen calm).

[theme_solarized_dark]
background = dark
comment    = gray +dim
string     = green
keyword    = green
type       = yellow
number     = magenta
constant   = magenta
function   = blue
preproc    = brightmagenta
builtin    = cyan
error      = brightred

[theme_solarized_light]
background = light
extends    = solarized_dark   # inherit, then nudge a few for a light terminal
comment    = brightblack +dim
function   = blue
keyword    = green
